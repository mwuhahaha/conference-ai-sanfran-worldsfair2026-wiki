name: Deploy to Cloudflare Pages

env:
  WIKI_MAKER_REF: f27b9f3bdcc3ee35fea83e32506e0bdc094c0c7b

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wiki maker
        run: python -m pip install "git+https://github.com/mwuhahaha/wiki-from-topic-maker.git@${WIKI_MAKER_REF}"

      - name: Build
        run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.86.0
          command: pages deploy dist --project-name aie-worldsfair2026 --branch main
